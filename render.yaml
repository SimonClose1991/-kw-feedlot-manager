# Render blueprint that unzips app.zip, then builds and runs the app.
# Your GitHub repo only needs TWO files: this file and app.zip.

databases:
  - name: feedlot-db
    plan: free
    databaseName: feedlot
    user: feedlot

services:
  - type: web
    name: kw-feedlot-manager
    runtime: node
    plan: free
    buildCommand: "unzip -o app.zip -d . && npm install && npm run build"
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: feedlot-db
          property: connectionString
